name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  cross-platform:
    name: ${{ matrix.os }} workspace, gates, e2e
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    env:
      CARGO_TARGET_DIR: ${{ runner.temp }}/franken-snowflake-target
      FSNOW_ARTIFACTS_DIR: ${{ runner.temp }}/franken-snowflake-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show pinned toolchain
        run: |
          rustup show
          rustc --version --verbose
          cargo --version --verbose

      - name: Cargo check
        run: cargo check --workspace --locked

      - name: Assert dependency admissibility
        run: python scripts/check-dependency-admissibility.py
        env:
          # Upstream prerequisite for the cache crate on Windows:
          # fsqlite-vfs/fsqlite-mvcc must re-gate the Unix-only nix dependency
          # from cfg(not(wasm32)) to cfg(unix). Until then, Windows CI runs the
          # admissibility gate with only that optional lane explicitly skipped.
          FSNOW_SKIP_FSQLITE_WINDOWS_PREREQ: ${{ runner.os == 'Windows' && '1' || '0' }}

      - name: Assert LF-only golden fixtures
        run: python scripts/check-golden-lf.py

      - name: Assert installer shell UI safety
        if: runner.os != 'Windows'
        run: bash scripts/check-install-sh-ui.sh

      - name: Run deterministic mock e2e harness
        run: cargo test --locked -p franken-snowflake-testkit --test e2e_harness

  linux-lints:
    name: linux lint and single-version gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TARGET_DIR: ${{ runner.temp }}/franken-snowflake-target
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show pinned toolchain
        run: |
          rustup show
          rustc --version --verbose
          cargo --version --verbose

      - name: Workspace lint policy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Assert single Asupersync version
        run: scripts/check-asupersync-single-version.sh
